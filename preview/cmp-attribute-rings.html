<!doctype html>
<html><head><meta charset="utf-8"><title>Attribute rings</title>
<link rel="stylesheet" href="_card.css">
<style>
  .row{ display:grid; grid-template-columns: repeat(6, 1fr); gap: 8px; }
  .att{ background: var(--nx-bg-2); border: 1px solid var(--nx-line-1); border-radius: 12px; padding: 12px 8px; display:flex; flex-direction: column; align-items: center; gap: 8px; }
  .ring{ position: relative; width: 76px; height: 76px; }
  svg{ transform: rotate(-90deg); }
  .track{ stroke: var(--nx-line-2); }
  .val{ position:absolute; inset: 0; display:flex; align-items:center; justify-content:center; font-family: var(--nx-font-display); font-weight: 700; font-size: 26px; color: var(--nx-fg-1); }
  .val.on{ color: var(--nx-accent); text-shadow: 0 0 14px rgba(0,255,136,0.4); }
  .val.gold{ color: #FFB800; }
  .lbl{ font-family: var(--nx-font-ui); font-weight: 700; font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--nx-fg-3); }
  .delta{ font-family: var(--nx-font-mono); font-size: 11px; color: var(--nx-accent); }
  .delta.dn{ color: var(--nx-crit); }
</style></head>
<body><div class="card">
  <div class="row">
    <div class="att">
      <div class="ring">
        <svg width="76" height="76"><circle class="track" cx="38" cy="38" r="32" stroke-width="6" fill="none"/><circle cx="38" cy="38" r="32" stroke="#00FF88" stroke-width="6" fill="none" stroke-linecap="round" stroke-dasharray="201" stroke-dashoffset="44" style="filter: drop-shadow(0 0 6px rgba(0,255,136,0.6))"/></svg>
        <span class="val on">79</span>
      </div>
      <span class="lbl">Pas</span>
      <span class="delta">▲ 6</span>
    </div>
    <div class="att">
      <div class="ring">
        <svg width="76" height="76"><circle class="track" cx="38" cy="38" r="32" stroke-width="6" fill="none"/><circle cx="38" cy="38" r="32" stroke="#FFB800" stroke-width="6" fill="none" stroke-linecap="round" stroke-dasharray="201" stroke-dashoffset="38"/></svg>
        <span class="val gold">81</span>
      </div>
      <span class="lbl">Şut</span>
      <span class="delta">▲ 2</span>
    </div>
    <div class="att">
      <div class="ring">
        <svg width="76" height="76"><circle class="track" cx="38" cy="38" r="32" stroke-width="6" fill="none"/><circle cx="38" cy="38" r="32" stroke="#fff" stroke-width="6" fill="none" stroke-linecap="round" stroke-dasharray="201" stroke-dashoffset="30"/></svg>
        <span class="val">85</span>
      </div>
      <span class="lbl">Hız</span>
      <span class="delta">▲ 1</span>
    </div>
    <div class="att">
      <div class="ring">
        <svg width="76" height="76"><circle class="track" cx="38" cy="38" r="32" stroke-width="6" fill="none"/><circle cx="38" cy="38" r="32" stroke="#fff" stroke-width="6" fill="none" stroke-linecap="round" stroke-dasharray="201" stroke-dashoffset="48"/></svg>
        <span class="val">76</span>
      </div>
      <span class="lbl">Savunma</span>
      <span class="delta dn">▼ 2</span>
    </div>
    <div class="att">
      <div class="ring">
        <svg width="76" height="76"><circle class="track" cx="38" cy="38" r="32" stroke-width="6" fill="none"/><circle cx="38" cy="38" r="32" stroke="#00FF88" stroke-width="6" fill="none" stroke-linecap="round" stroke-dasharray="201" stroke-dashoffset="24" style="filter: drop-shadow(0 0 6px rgba(0,255,136,0.6))"/></svg>
        <span class="val on">88</span>
      </div>
      <span class="lbl">Dribbling</span>
      <span class="delta">▲ 4</span>
    </div>
    <div class="att">
      <div class="ring">
        <svg width="76" height="76"><circle class="track" cx="38" cy="38" r="32" stroke-width="6" fill="none"/><circle cx="38" cy="38" r="32" stroke="#fff" stroke-width="6" fill="none" stroke-linecap="round" stroke-dasharray="201" stroke-dashoffset="52"/></svg>
        <span class="val">74</span>
      </div>
      <span class="lbl">Fizik</span>
      <span class="delta">▲ 1</span>
    </div>
  </div>
</div></body></html>
