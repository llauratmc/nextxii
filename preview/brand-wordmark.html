<!doctype html>
<html><head><meta charset="utf-8"><title>Wordmark</title>
<link rel="stylesheet" href="_card.css">
<style>
  .stage{
    display:flex; align-items:center; justify-content:center;
    height: 200px; background: var(--nx-bg-1);
    border: 1px solid var(--nx-line-1); border-radius: 16px;
  }
  .stage img{ width: 280px; height:auto; display:block; }
  .meta{ display:flex; gap:24px; margin-top:14px; }
  .meta .nx-label{ color: var(--nx-fg-3); }
  .meta .v{ color: var(--nx-fg-1); font-family: var(--nx-font-mono); font-size: 13px; margin-top: 4px; display:block; }
</style></head>
<body><div class="card">
  <div class="stage"><img src="../assets/next_xi_logo.svg" alt=""></div>
  <div class="meta">
    <div><span class="nx-label">Plate</span><span class="v">#0B0B0B</span></div>
    <div><span class="nx-label">NEXT</span><span class="v">#FFFFFF · Oswald 48</span></div>
    <div><span class="nx-label">XI accent</span><span class="v">#00FF88 · Oswald 64 / 700</span></div>
  </div>
</div></body></html>
