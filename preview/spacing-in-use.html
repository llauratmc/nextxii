<!doctype html>
<html><head><meta charset="utf-8"><title>Spacing in use</title>
<link rel="stylesheet" href="_card.css">
<style>
  .frame{
    background: var(--nx-bg-2); border:1px solid var(--nx-line-1);
    border-radius: 16px; padding: 24px;
    display:flex; flex-direction:column; gap: 16px;
  }
  .lbl{ font-family: var(--nx-font-ui); font-weight:700; font-size:11px; text-transform: uppercase; letter-spacing:0.14em; color: var(--nx-fg-3); }
  .stat{ font-family: var(--nx-font-display); font-weight: 700; font-size: 56px; line-height: 0.95; color: var(--nx-fg-1); }
  .row{ display:flex; gap: 12px; }
  .chip{
    background: var(--nx-bg-3); border: 1px solid var(--nx-line-1);
    border-radius: 999px; padding: 6px 12px;
    font-family: var(--nx-font-ui); font-weight: 600; font-size: 12px; color: var(--nx-fg-2);
  }
  .anno{ font-family: var(--nx-font-mono); font-size: 10px; color: var(--nx-fg-4); }
  .h{ display:flex; justify-content: space-between; align-items: baseline; }
  .head{ font-family: var(--nx-font-display); font-weight: 600; font-size: 18px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--nx-fg-1); }
</style></head>
<body><div class="card">
  <div class="frame">
    <div class="h"><span class="head">BU HAFTAKİ FORM</span><span class="anno">↳ s-4 · 16</span></div>
    <span class="lbl">Genel · OVR</span>
    <span class="stat">82</span>
    <div class="row">
      <span class="chip">+%6 pas</span>
      <span class="chip">+12 XP</span>
      <span class="chip">6 maç</span>
    </div>
    <span class="anno">card padding s-6 · 24 · row gap s-3 · 12 · stack gap s-4 · 16</span>
  </div>
</div></body></html>
