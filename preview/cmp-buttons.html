<!doctype html>
<html><head><meta charset="utf-8"><title>Buttons</title>
<link rel="stylesheet" href="_card.css">
<style>
  .stack{ display:flex; flex-direction: column; gap: 14px; }
  .row{ display:flex; gap: 12px; align-items:center; flex-wrap: wrap; }
  .lbl{ font-family: var(--nx-font-ui); font-weight: 700; font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--nx-fg-3); width: 100px; }
  button{
    font-family: var(--nx-font-ui); font-weight: 700; font-size: 14px;
    letter-spacing: 0.04em; text-transform: uppercase;
    border: none; cursor: pointer; padding: 14px 22px; border-radius: 12px;
    display:inline-flex; align-items:center; gap: 8px;
  }
  .primary{ background: var(--nx-accent); color: #001A0E; box-shadow: 0 0 24px rgba(0,255,136,0.45); }
  .primary.hover{ background: var(--nx-accent-hi); }
  .primary.press{ background: var(--nx-accent-lo); box-shadow: inset 0 1px 0 rgba(0,0,0,0.4); transform: translateY(1px); }
  .secondary{ background: var(--nx-bg-3); color: var(--nx-fg-1); border: 1px solid var(--nx-line-2); }
  .ghost{ background: transparent; color: var(--nx-fg-1); border: 1px solid var(--nx-line-2); }
  .destructive{ background: transparent; color: var(--nx-crit); border: 1px solid color-mix(in oklab, var(--nx-crit) 50%, transparent); }
  .disabled{ background: var(--nx-bg-3); color: var(--nx-fg-4); border: 1px solid var(--nx-line-1); cursor: not-allowed; }
  .arrow::after{ content: "→"; font-weight: 800; }
</style></head>
<body><div class="card">
  <div class="stack">
    <div class="row"><span class="lbl">Primary</span>
      <button class="primary arrow">BAŞLA</button>
      <button class="primary hover arrow">START SESSION</button>
      <button class="primary press">+120 XP</button>
    </div>
    <div class="row"><span class="lbl">Secondary</span>
      <button class="secondary">Detayları gör</button>
      <button class="secondary">View report</button>
    </div>
    <div class="row"><span class="lbl">Ghost / Crit</span>
      <button class="ghost">Sonra</button>
      <button class="destructive">Pas geç</button>
      <button class="disabled">Kilitli</button>
    </div>
  </div>
</div></body></html>
