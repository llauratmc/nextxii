<!doctype html>
<html><head><meta charset="utf-8"><title>Achievements</title>
<link rel="stylesheet" href="_card.css">
<style>
  .row{ display:grid; grid-template-columns: 1.2fr 1fr 1fr; gap: 12px; }
  .ach{
    background: var(--nx-bg-2); border:1px solid var(--nx-line-1);
    border-radius: 14px; padding: 14px;
    display:flex; flex-direction: column; gap: 8px; height: 200px; position: relative; overflow:hidden;
  }
  .ach.unlocked{ border-color: rgba(0,255,136,0.4); box-shadow: 0 0 0 1px rgba(0,255,136,0.18) inset, 0 0 32px rgba(0,255,136,0.18); }
  .ach.locked{ opacity: 0.55; filter: grayscale(0.6); }
  .badge{
    width: 56px; height: 64px; align-self: flex-start;
    clip-path: polygon(50% 0, 100% 22%, 100% 78%, 50% 100%, 0 78%, 0 22%);
    background: linear-gradient(180deg, #FFB800, #B07700);
    display:flex; align-items: center; justify-content:center;
  }
  .ach.unlocked .badge{ background: linear-gradient(180deg, #00FF88, #00C46A); box-shadow: 0 0 24px rgba(0,255,136,0.45); }
  .ach.locked .badge{ background: linear-gradient(180deg, #2a2a2a, #1a1a1a); }
  .badge svg{ width: 28px; height: 28px; }
  .name{ font-family: var(--nx-font-display); font-weight: 700; font-size: 18px; text-transform: uppercase; color: var(--nx-fg-1); }
  .desc{ font-family: var(--nx-font-ui); font-size: 12px; color: var(--nx-fg-3); line-height: 1.4; }
  .progress{ height: 6px; border-radius: 999px; background: var(--nx-bg-4); overflow:hidden; margin-top: auto; }
  .progress > div{ height: 100%; background: var(--nx-accent); box-shadow: 0 0 12px rgba(0,255,136,0.5); }
  .pct{ font-family: var(--nx-font-mono); font-size: 11px; color: var(--nx-fg-2); }
  .meta{ display:flex; justify-content: space-between; align-items: center;}
</style></head>
<body><div class="card">
  <div class="row">
    <div class="ach unlocked">
      <div class="badge"><svg viewBox="0 0 24 24" fill="#001A0E"><path d="M6 3h12v3a6 6 0 0 1-3 5.2v3.3l3 1.5v3H6v-3l3-1.5v-3.3A6 6 0 0 1 6 6V3Zm2 2v1a4 4 0 0 0 8 0V5H8Z"/></svg></div>
      <div class="name">Hat Trick</div>
      <div class="desc">Tek maçta 3 gol at. Gerçek bir bitirici olduğunu kanıtla.</div>
      <div class="meta"><span class="pct" style="color:var(--nx-accent)">UNLOCKED · 12 May</span><span class="pct">+250 XP</span></div>
    </div>
    <div class="ach">
      <div class="badge"><svg viewBox="0 0 24 24" fill="#1a1100"><path d="M13 2 4 14h6l-1 8 9-12h-6l1-8Z"/></svg></div>
      <div class="name">Win Streak</div>
      <div class="desc">Üst üste 5 maç kazan.</div>
      <div class="progress"><div style="width: 60%"></div></div>
      <div class="meta"><span class="pct">3 / 5</span><span class="pct">+180 XP</span></div>
    </div>
    <div class="ach locked">
      <div class="badge"><svg viewBox="0 0 24 24" fill="#666"><path d="M6 8a6 6 0 1 1 12 0v2h2v10H4V10h2V8Zm2 0v2h8V8a4 4 0 0 0-8 0Z"/></svg></div>
      <div class="name">Captain</div>
      <div class="desc">10 maça takım kaptanı olarak çık.</div>
      <div class="progress"><div style="width: 0%"></div></div>
      <div class="meta"><span class="pct">0 / 10</span><span class="pct">LOCKED</span></div>
    </div>
  </div>
</div></body></html>
