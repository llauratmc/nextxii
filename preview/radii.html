<!doctype html>
<html><head><meta charset="utf-8"><title>Radii</title>
<link rel="stylesheet" href="_card.css">
<style>
  .row{ display:grid; grid-template-columns: repeat(6, 1fr); gap: 10px; }
  .stack{ display:flex; flex-direction: column; align-items: center; gap: 8px; }
  .box{ width: 86px; height: 86px; background: var(--nx-bg-3); border: 1px solid var(--nx-line-2); }
  .lbl{ font-family: var(--nx-font-mono); font-size: 11px; color: var(--nx-fg-3); }
  .name{ font-family: var(--nx-font-ui); font-size: 11px; color: var(--nx-fg-2); font-weight: 600; }
</style></head>
<body><div class="card">
  <div class="row">
    <div class="stack"><div class="box" style="border-radius:4px"></div><span class="name">r-1</span><span class="lbl">4 · tier badge</span></div>
    <div class="stack"><div class="box" style="border-radius:8px"></div><span class="name">r-2</span><span class="lbl">8 · chip</span></div>
    <div class="stack"><div class="box" style="border-radius:12px"></div><span class="name">r-3</span><span class="lbl">12 · button</span></div>
    <div class="stack"><div class="box" style="border-radius:16px"></div><span class="name">r-4</span><span class="lbl">16 · card</span></div>
    <div class="stack"><div class="box" style="border-radius:24px"></div><span class="name">r-5</span><span class="lbl">24 · sheet</span></div>
    <div class="stack"><div class="box" style="border-radius:999px"></div><span class="name">pill</span><span class="lbl">∞ · pill / ring</span></div>
  </div>
</div></body></html>
