<!doctype html>
<html><head><meta charset="utf-8"><title>Brand accent</title>
<link rel="stylesheet" href="_card.css">
<style>
  .row{ display:grid; grid-template-columns: 1.4fr 1fr 1fr 1fr; gap:10px; }
  .sw{
    height: 156px; border-radius: 14px;
    padding: 14px; display:flex; flex-direction: column; justify-content: space-between;
    border: 1px solid var(--nx-line-1);
  }
  .glow{ background: var(--nx-accent); box-shadow: 0 0 32px rgba(0,255,136,0.55); border-color: transparent; }
  .glow .lbl, .glow .name, .glow .hex{ color: #001A0E; }
  .glow .name{ color: #001A0E; }
  .lbl{ font-family: var(--nx-font-ui); font-weight: 700; font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--nx-fg-3); }
  .name{ font-family: var(--nx-font-display); font-weight: 700; font-size: 26px; text-transform: uppercase; color: var(--nx-fg-1); }
  .hex{ font-family: var(--nx-font-mono); font-size: 11px; color: var(--nx-fg-3); }
</style></head>
<body><div class="card">
  <div class="row">
    <div class="sw glow">
      <span class="lbl">accent · primary</span>
      <span class="name">Pitch green</span>
      <span class="hex">#00FF88 · only color allowed to glow</span>
    </div>
    <div class="sw" style="background:#6BFFB4">
      <span class="lbl" style="color:#001A0E">accent-hi · hover</span>
      <span class="name" style="color:#001A0E">Hi</span>
      <span class="hex" style="color:#001A0E">#6BFFB4</span>
    </div>
    <div class="sw" style="background:#00C46A">
      <span class="lbl" style="color:#001A0E">accent-lo · pressed</span>
      <span class="name" style="color:#001A0E">Lo</span>
      <span class="hex" style="color:#001A0E">#00C46A</span>
    </div>
    <div class="sw" style="background:#0E1A12">
      <span class="lbl">bg-pitch · field tint</span>
      <span class="name">Pitch</span>
      <span class="hex">#0E1A12</span>
    </div>
  </div>
</div></body></html>
