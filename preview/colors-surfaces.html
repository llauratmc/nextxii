<!doctype html>
<html><head><meta charset="utf-8"><title>Surfaces</title>
<link rel="stylesheet" href="_card.css">
<style>
  .row{ display:grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
  .sw{
    height: 132px; border-radius: 12px;
    border: 1px solid var(--nx-line-1);
    padding: 12px; display:flex; flex-direction: column; justify-content: space-between;
  }
  .name{ font-family: var(--nx-font-ui); font-weight:700; font-size:13px; color: var(--nx-fg-1);}
  .hex{ font-family: var(--nx-font-mono); font-size: 11px; color: var(--nx-fg-3); }
  .lbl{ font-family: var(--nx-font-ui); font-weight:700; font-size: 10px; color: var(--nx-fg-3); letter-spacing: 0.14em; text-transform: uppercase; }
</style></head>
<body><div class="card">
  <div class="row">
    <div class="sw" style="background:#050505"><span class="lbl">bg-0 · void</span><span class="col"><span class="name">Void</span><span class="hex">#050505</span></span></div>
    <div class="sw" style="background:#0B0B0B"><span class="lbl">bg-1 · canvas</span><span class="col"><span class="name">Canvas</span><span class="hex">#0B0B0B</span></span></div>
    <div class="sw" style="background:#141414"><span class="lbl">bg-2 · card</span><span class="col"><span class="name">Card</span><span class="hex">#141414</span></span></div>
    <div class="sw" style="background:#1C1C1C"><span class="lbl">bg-3 · raised</span><span class="col"><span class="name">Raised</span><span class="hex">#1C1C1C</span></span></div>
    <div class="sw" style="background:#242424"><span class="lbl">bg-4 · input</span><span class="col"><span class="name">Input</span><span class="hex">#242424</span></span></div>
  </div>
</div></body></html>
