<!doctype html>
<html><head><meta charset="utf-8"><title>App icon</title>
<link rel="stylesheet" href="_card.css">
<style>
  .row{ display:flex; gap:24px; align-items:center; justify-content:flex-start; padding: 8px 0; }
  .tile{ background: var(--nx-bg-2); border-radius: 18px; padding: 18px; display:flex; align-items:center; justify-content:center; border:1px solid var(--nx-line-1); }
  .tile img{ display:block; }
  .s-180 img{ width: 132px; height: 132px; border-radius: 28px; }
  .s-120 img{ width: 88px; height: 88px; border-radius: 20px; }
  .s-60  img{ width: 48px; height: 48px; border-radius: 11px; }
  .s-32  img{ width: 28px; height: 28px; border-radius: 7px; }
  .stack{ display:flex; flex-direction: column; align-items:center; gap: 8px; }
  .nx-label{ color: var(--nx-fg-3); }
</style></head>
<body><div class="card">
  <div class="row">
    <div class="stack"><div class="tile s-180"><img src="../assets/next_xi_app_icon.svg" alt=""></div><span class="nx-label">180·iOS</span></div>
    <div class="stack"><div class="tile s-120"><img src="../assets/next_xi_app_icon.svg" alt=""></div><span class="nx-label">120</span></div>
    <div class="stack"><div class="tile s-60"><img src="../assets/next_xi_app_icon.svg" alt=""></div><span class="nx-label">60</span></div>
    <div class="stack"><div class="tile s-32"><img src="../assets/next_xi_app_icon.svg" alt=""></div><span class="nx-label">32</span></div>
  </div>
</div></body></html>
